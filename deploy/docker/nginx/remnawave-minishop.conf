# Example external Nginx reverse proxy for Remna User Panel.
#
# The backend serves webhooks, the Mini App, and static assets on a single
# port (8080). Point a single domain to backend:8080.

upstream remnawave_backend {
    server backend:8080;
    keepalive 16;
}

# TLS certificates.
#
# Option 1: Let's Encrypt with Certbot. Keep port 80 open and point DNS
# A/AAAA records to the host that terminates TLS:
#   certbot certonly --nginx -d shop.example.com
# Certbot stores them as:
#   /etc/letsencrypt/live/shop.example.com/fullchain.pem
#   /etc/letsencrypt/live/shop.example.com/privkey.pem
#
# Option 2: use a wildcard certificate:
#   certbot certonly --manual --preferred-challenges dns -d example.com -d "*.example.com"
# Then:
#   /etc/letsencrypt/live/example.com/fullchain.pem
#   /etc/letsencrypt/live/example.com/privkey.pem

server {
    listen 80;
    server_name shop.example.com;

    return 301 https://$host$request_uri;
}

# Single server block for webhooks, Mini App, API, and static assets.
server {
    listen 443 ssl;
    http2 on;
    server_name shop.example.com;

    ssl_certificate /etc/nginx/ssl/shop.example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/shop.example.com/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://remnawave_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Required for payment provider IP allowlists in webhook handlers.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
