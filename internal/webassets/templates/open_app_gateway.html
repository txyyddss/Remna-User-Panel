<!doctype html>
<html lang="__LANG__">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="app-favicon" rel="icon" href="data:," sizes="any">
    <title>__PAGE_TITLE__</title>
    <style nonce="__NONCE__">
      :root {
        color-scheme: dark light;
        --accent: #14b86f;
        --accent-contrast: #03120b;
        --bg: #0b1017;
        --panel-3: #344052;
        --border: #2d3847;
        --text: #f7fafc;
        --muted: #aeb8c5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 420px);
        display: grid;
        gap: 14px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 4px;
      }

      .button {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--accent);
        color: var(--accent-contrast);
        padding: 0 18px;
        box-sizing: border-box;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      .button.secondary {
        border-color: var(--border);
        background: transparent;
        color: var(--text);
      }

      .button[aria-disabled="true"] {
        pointer-events: none;
        background: var(--panel-3);
        color: var(--muted);
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title"></h1>
      <p id="status"></p>
      <div class="actions">
        <a id="open-link" class="button" href="#" rel="noreferrer"></a>
        <button id="close-button" class="button secondary" type="button" hidden></button>
      </div>
    </main>
    <script nonce="__NONCE__">
      (() => {
        const messages = __MESSAGES_JSON__;
        const titleEl = document.getElementById("title");
        const statusEl = document.getElementById("status");
        const openLink = document.getElementById("open-link");
        const closeButton = document.getElementById("close-button");
        const params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const rawTarget = String(params.get("url") || "").trim();

        // -----------------------------------------------------------------------
        // URL sanitization — prevents XSS and open redirect
        // -----------------------------------------------------------------------

        // Allowed URL schemes (whitelist).  Only these schemes may be used
        // for navigation or href assignment.
        var ALLOWED_SCHEMES = ["http:", "https:", "tg:", "vpn:", "ssconf:", "ss:", "snell:", "vmess:", "trojan:", "hysteria:", "vless:", "tuic:", "juicity:", "wireguard:", "clash:", "surge:", "quantumult:", "shadowrocket:", "loon:"];

        /** Install a Trusted Types policy (CSP trusted-types) for creating
         *  safe URLs from sanitized strings.  Falls back gracefully when
         *  Trusted Types are not supported. */
        var trustedURLPolicy = null;
        if (typeof trustedTypes !== "undefined" && trustedTypes.createPolicy) {
          try {
            trustedURLPolicy = trustedTypes.createPolicy("gateway-url", {
              createURL: function (input) {
                // The input has already been validated by sanitizeURL.
                return input;
              }
            });
          } catch (_e) { /* policy already registered or not supported */ }
        }

        /** Create a TrustedURL from a sanitized string, or return the
         *  string as-is on browsers without Trusted Types support. */
        function createTrustedURL(safe) {
          if (!safe) return safe;
          if (trustedURLPolicy) {
            try { return trustedURLPolicy.createURL(safe); } catch (_e) { void _e; }
          }
          return safe;
        }

        function hasControlChars(value) {
          return Array.from(String(value || "")).some(function (char) {
            var code = char.charCodeAt(0);
            return code <= 31 || code === 127;
          });
        }

        /** Safely parse and validate a URL. Returns null for dangerous inputs. */
        function sanitizeURL(raw) {
          if (!raw || hasControlChars(raw)) return null;

          // Only allow whitelisted schemes.  This is more robust than a
          // blocklist because any unknown or future dangerous scheme is
          // rejected by default.
          var schemeMatch = raw.match(/^([a-zA-Z][a-zA-Z0-9+\-.]*):/);
          if (!schemeMatch) return null;
          var scheme = schemeMatch[1].toLowerCase() + ":";
          var allowed = false;
          for (var i = 0; i < ALLOWED_SCHEMES.length; i++) {
            if (scheme === ALLOWED_SCHEMES[i]) { allowed = true; break; }
          }
          if (!allowed) return null;

          // For http/https URLs, parse with the URL API and validate thoroughly.
          if (scheme === "http:" || scheme === "https:") {
            try {
              var parsed = new URL(raw);
              if (parsed.protocol !== "http:" && parsed.protocol !== "https:") return null;
              // Block URLs with embedded credentials (phishing vector).
              if (parsed.username || parsed.password) return null;
              return parsed.href;
            } catch (_e) {
              return null;
            }
          }

          // For custom/deep-link schemes (e.g., "tg://", "vpn://"), the
          // scheme prefix was already validated against the whitelist above.
          // Double-check the decoded value does not contain dangerous schemes
          // hidden behind encoding.
          var decoded = raw;
          try { decoded = decodeURIComponent(raw); } catch (_e) { void _e; }
          var decodedScheme = decoded.match(/^([a-zA-Z][a-zA-Z0-9+\-.]*):/);
          if (decodedScheme && scheme !== decodedScheme[1].toLowerCase() + ":") return null;
          return raw;
        }

        /** Safely assign a URL to an anchor's href using Trusted Types when
         *  available.  Never sets href from unsanitized user input. */
        function setSafeHref(el, url) {
          if (!url) { el.removeAttribute("href"); return; }
          var safe = sanitizeURL(url);
          if (safe) {
            var trusted = createTrustedURL(safe);
            if (trusted && typeof trusted === "object") {
              // TrustedURL object — must be used with trustedTypes protection.
              // On supporting browsers this prevents XSS via href injection.
              try { el.href = trusted; } catch (_e) { el.href = safe; }
            } else {
              el.href = safe;
            }
          } else {
            el.removeAttribute("href");
          }
        }

        /** Safely navigate to a URL (not via anchor href). */
        function safeNavigate(url) {
          var safe = sanitizeURL(url);
          if (!safe) return;
          // Use location.assign (safer than setting location.href directly) with a
          // validated URL to prevent script execution via javascript: URLs.
          try { window.location.assign(safe); } catch (_e) { void _e; }
        }

        var target = sanitizeURL(rawTarget);
        var isUnsafe = target === null;
        var attempted = false;
        var pageLeft = false;
        var state = "opening";
        var closeAttemptTimer = null;
        var CLOSE_ATTEMPT_DELAY_MS = 2500;

        function text(key, fallback) {
          var value = messages && messages[key];
          return typeof value === "string" && value ? value : fallback;
        }

        function tryCloseWindow() {
          try { window.close(); } catch (_error) { void _error; }
        }

        function render(nextState) {
          state = nextState;
          if (nextState === "unavailable") {
            titleEl.textContent = text("unavailableTitle", "App link unavailable");
            statusEl.textContent = text("unavailableHint", "Return to Telegram and try again.");
            openLink.textContent = text("button", "Open app");
            openLink.setAttribute("aria-disabled", "true");
            openLink.removeAttribute("href");
            closeButton.hidden = true;
            return;
          }

          if (nextState === "done") {
            titleEl.textContent = text("doneTitle", "Settings added");
            statusEl.textContent = text("doneHint", "You can close this window.");
            openLink.textContent = text("retryButton", "Open again");
            openLink.removeAttribute("aria-disabled");
            setSafeHref(openLink, target);
            closeButton.textContent = text("closeButton", "Close window");
            closeButton.hidden = false;
            return;
          }

          titleEl.textContent = text("title", "Opening app");
          statusEl.textContent =
            nextState === "manual"
              ? text("manualHint", "If the app did not open automatically, tap the button below.")
              : text("hint", "Opening the app on this device...");
          openLink.textContent = text("button", "Open app");
          openLink.removeAttribute("aria-disabled");
          setSafeHref(openLink, target);
          closeButton.hidden = true;
        }

        function markDone() {
          if (state === "done" || isUnsafe) return;
          render("done");
          if (closeAttemptTimer) window.clearTimeout(closeAttemptTimer);
          closeAttemptTimer = window.setTimeout(function () {
            if (pageLeft || document.hidden) tryCloseWindow();
          }, CLOSE_ATTEMPT_DELAY_MS);
        }

        function notePageLeft() {
          if (!attempted) return;
          pageLeft = true;
          window.setTimeout(markDone, 900);
        }

        function openTarget() {
          if (isUnsafe) return;
          attempted = true;
          pageLeft = false;
          render("opening");
          safeNavigate(target);
          window.setTimeout(function () {
            if (state === "opening" && !pageLeft) render("manual");
          }, 1600);
        }

        if (isUnsafe) {
          render("unavailable");
          return;
        }

        openLink.addEventListener("click", function (event) {
          event.preventDefault();
          openTarget();
        });
        closeButton.addEventListener("click", function () {
          tryCloseWindow();
          render("done");
        });
        window.addEventListener("pagehide", notePageLeft);
        document.addEventListener("visibilitychange", function () {
          if (!attempted) return;
          if (document.hidden) {
            pageLeft = true;
          } else if (pageLeft) {
            markDone();
          }
        });

        render("opening");
        window.setTimeout(openTarget, 80);
      })();
    </script>
  </body>
</html>
