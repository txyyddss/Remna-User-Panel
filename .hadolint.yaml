# hadolint configuration for Remna User Panel
# https://github.com/hadolint/hadolint#configure

ignored:
  # DL3008: Pin versions in apt-get install.
  # postgresql-client-17 is already version-pinned; ca-certificates and curl
  # come from the base Debian image and are safe to use without explicit pinning.
  - DL3008
  # DL4006: Set the SHELL option -o pipefail before RUN with a pipe.
  # The gpg --dearmor pipe is a standard PostgreSQL APT repo setup pattern.
  - DL4006
  # DL3059: Multiple consecutive RUN instructions.
  # The multi-stage build is intentionally structured for clarity.
  - DL3059

override:
  style:
    - DL3042  # pip install cache dir (not applicable – no Python)
    - DL3018  # pip install pinning (not applicable)
  warning:
    - DL3006  # Always tag the version of an image explicitly
