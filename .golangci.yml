# golangci-lint configuration for Remna User Panel
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  go: "1.26"
  tests: true
  allow-parallel-runners: true

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - unused
    - revive
    - misspell
    - copyloopvar
    - nilerr
    - unconvert
    - unparam
    - wastedassign
  settings:
    gosec:
      excludes:
        # G104: Audit errors not checked – too noisy for existing codebase
        - G104
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

formatters:
  enable:
    - gofmt
    - goimports
