name: Quality, Docker package & release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  IMAGE_PREFIX: remna-user-panel

jobs:
  quality:
    name: Frontend and backend quality gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum

      - name: Check gofmt
        run: test -z "$(gofmt -l cmd internal pkg)"

      - name: Go vet
        run: go vet ./...

      - name: Go test with race detector
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: ESLint frontend
        run: npm run lint
        working-directory: frontend

      - name: Prettier frontend
        run: npm run format:check
        working-directory: frontend

      - name: Build webapp
        run: npm run build:webapp
        working-directory: frontend

  docker:
    name: Build, push and archive Docker image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [backend, worker, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image names
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          short_sha="$(git rev-parse --short=12 HEAD)"
          image="ghcr.io/${owner}/${IMAGE_PREFIX}-${{ matrix.target }}"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "archive=remna-user-panel-${{ matrix.target }}-${short_sha}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build and push GHCR image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}
          build-args: |
            GITHUB_REF_NAME=main
            REMNAWAVE_MINISHOP_BUILD_PROVENANCE=custom
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          provenance: false

      - name: Export Docker image tar.gz
        shell: bash
        run: |
          mkdir -p dist
          tar_path="${RUNNER_TEMP}/remna-user-panel-${{ matrix.target }}.tar"
          docker buildx build \
            --file deploy/docker/Dockerfile \
            --target "${{ matrix.target }}" \
            --platform linux/amd64 \
            --build-arg GITHUB_REF_NAME=main \
            --build-arg REMNAWAVE_MINISHOP_BUILD_PROVENANCE=custom \
            --tag "${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}" \
            --output "type=docker,dest=${tar_path}" \
            .
          gzip -9c "${tar_path}" > "dist/${{ steps.meta.outputs.archive }}"

      - name: Upload image archive
        uses: actions/upload-artifact@v7
        with:
          name: docker-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          tag="auto-${GITHUB_RUN_NUMBER}-${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download Docker archives
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: docker-*
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" dist/* \
            --target "${GITHUB_SHA}" \
            --title "Automated release ${{ steps.meta.outputs.short_sha }}" \
            --notes "Automated main-branch release for commit ${GITHUB_SHA}. Images were pushed to GHCR and archived as tar.gz assets."
