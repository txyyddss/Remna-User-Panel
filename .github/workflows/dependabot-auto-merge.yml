name: Dependabot auto-merge

on:
  workflow_run:
    workflows: ["Quality, Docker package & release"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge Dependabot PR after CI
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Find matching Dependabot PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          prs_json="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --search "$SHA" --json number,author,headRefOid)"
          number="$(jq -r '.[] | select(.headRefOid == env.SHA and .author.login == "dependabot[bot]") | .number' <<< "$prs_json" | head -n 1)"
          if [ -z "$number" ] || [ "$number" = "null" ]; then
            echo "number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Merge PR
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
