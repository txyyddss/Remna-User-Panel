services:
  backend:
    container_name: remna-user-panel-backend
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: backend
    image: ghcr.io/${IMAGE_NAMESPACE:-local}/remna-user-panel-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Run with a real init (tini) as PID 1 so the healthcheck process is reaped.
    init: true
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      WEBAPP_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - shop-data:/app/data
      - ${COMPOSE_BACKUP_SOURCE:-.}:/app/compose-source:${COMPOSE_RESTORE_MODE:-rw}
    networks:
      - remna-user-panel
    ports:
      - "127.0.0.1:${WEB_SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    container_name: remna-user-panel-worker
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: worker
    image: ghcr.io/${IMAGE_NAMESPACE:-local}/remna-user-panel-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Real init (tini) as PID 1 for proper signal forwarding / zombie reaping.
    init: true
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - shop-data:/app/data
      - ${COMPOSE_BACKUP_SOURCE:-.}:/app/compose-source:ro
    networks:
      - remna-user-panel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  migrate:
    container_name: remna-user-panel-migrate
    image: ghcr.io/${IMAGE_NAMESPACE:-local}/remna-user-panel-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: backend
    command: ["remna-user-panel-migrate"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - shop-data:/app/data
    networks:
      - remna-user-panel

  postgres:
    image: postgres:17
    container_name: remna-user-panel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - remna-user-panel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: remna-user-panel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    networks:
      - remna-user-panel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  remna-user-panel:

volumes:
  postgres-data:
    name: remna-user-panel-db-data
  redis-data:
    name: remna-user-panel-redis-data
  shop-data:
    name: remna-user-panel-shop-data
